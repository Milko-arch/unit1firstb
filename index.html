<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LinguoKids: The Magic Short A Quest</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"/>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;700;900&family=Bubblegum+Sans&family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        :root {
            --p-color: #6366f1;
            --s-color: #f43f5e;
            --bg-color: #f0f9ff;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg-color);
            overflow-x: hidden;
            user-select: none;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .font-game { font-family: 'Bubblegum Sans', cursive; }
        .font-bold-game { font-family: 'Fredoka One', cursive; }

        .btn-bounce {
            transition: all 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 8px 0px rgba(0,0,0,0.1);
        }
        .btn-bounce:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0px rgba(0,0,0,0.1);
        }

        .glass {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 4px solid white;
            border-radius: 40px;
        }

        .modal-overlay {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(4px);
        }

        .sparkle {
            position: absolute;
            pointer-events: none;
            background: white;
            border-radius: 50%;
            animation: sparkleAnim 0.8s ease-out forwards;
            z-index: 100;
        }

        @keyframes sparkleAnim {
            0% { transform: translate(-50%, -50%) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translate(calc(-50% + var(--tx)), calc(-50% + var(--ty))) scale(1.5) rotate(180deg); opacity: 0; }
        }

        .map-path {
            stroke-dasharray: 10;
            animation: dash 5s linear infinite;
        }
        @keyframes dash { to { stroke-dashoffset: -100; } }

        footer {
            margin-top: auto;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col">

    <!-- HUD -->
    <div class="fixed top-0 left-0 right-0 p-4 z-50 flex justify-between items-start pointer-events-none">
        <div class="flex flex-col gap-2 pointer-events-auto">
            <div class="glass px-6 py-2 flex items-center gap-3 shadow-xl">
                <span class="text-3xl">💎</span>
                <span id="stars-count" class="text-2xl font-bold-game text-indigo-600">0</span>
            </div>
            <div id="mission-toast" class="animate__animated animate__fadeInLeft bg-white/80 p-3 rounded-2xl border-2 border-indigo-200 flex items-center gap-3">
                <div id="leo-avatar-container" class="w-10 h-10 bg-indigo-100 rounded-full flex items-center justify-center overflow-hidden">
                    <img id="hud-avatar" src="https://api.dicebear.com/7.x/bottts/svg?seed=Leo" class="w-full h-full" alt="Avatar">
                </div>
                <p class="text-xs font-bold text-indigo-800 uppercase" id="leo-talk">Hello! Let's play.</p>
            </div>
        </div>

        <div class="flex flex-col items-end gap-2 pointer-events-auto">
            <button onclick="showSection('map')" class="glass p-4 btn-bounce bg-white">
                <span class="text-2xl">🏠</span>
            </button>
            <div class="glass p-2 flex flex-col gap-2" id="inventory">
                <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center opacity-30 grayscale transition-all" id="badge-1">🏆</div>
                <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center opacity-30 grayscale transition-all" id="badge-2">🎒</div>
                <div class="w-10 h-10 bg-slate-100 rounded-full flex items-center justify-center opacity-30 grayscale transition-all" id="badge-3">👑</div>
            </div>
        </div>
    </div>

    <!-- DIPLOMA NAME MODAL -->
    <div id="name-modal" class="fixed inset-0 z-[200] modal-overlay flex items-center justify-center p-6 hidden">
        <div class="glass max-w-md w-full p-8 text-center animate__animated animate__zoomIn">
            <h3 class="text-3xl font-bold-game text-indigo-600 mb-4">YOUR DIPLOMA IS READY!</h3>
            <p class="text-slate-600 mb-6 font-medium">Type your name for the certificate:</p>
            <input type="text" id="student-name" placeholder="Full name here..." class="w-full p-4 rounded-2xl border-4 border-indigo-100 focus:border-indigo-400 outline-none text-xl text-center font-bold mb-6">
            <button onclick="processCertificate()" class="w-full py-4 bg-indigo-600 text-white rounded-2xl font-bold-game text-xl btn-bounce">GET MY DIPLOMA! 🎓</button>
        </div>
    </div>

    <!-- Hero Selection / Welcome Page -->
    <div id="onboarding" class="fixed inset-0 z-[100] bg-indigo-600 flex flex-col items-center justify-center p-6 text-white overflow-y-auto">
        <div class="max-w-xl w-full text-center py-10 flex-grow flex flex-col justify-center">
            <div class="mb-4 animate__animated animate__fadeInDown">
                <h1 class="text-7xl font-bold-game tracking-wider drop-shadow-2xl">FOOTPRINTS</h1>
                <p class="text-3xl font-game text-indigo-200 mt-2 uppercase tracking-widest">UNIT 1 FIRST GRADE</p>
                <p class="text-lg font-game text-white/60 mt-1 uppercase">English Academy Quest</p>
            </div>
            
            <div class="w-24 h-1 bg-white/30 mx-auto my-8 rounded-full"></div>

            <h2 class="text-4xl font-game mb-8 animate__animated animate__fadeIn">CHOOSE YOUR HERO!</h2>
            <div class="grid grid-cols-2 gap-6 mb-12">
                <div onclick="selectPower('blue', 'Leo')" class="glass p-6 cursor-pointer hover:scale-105 transition-all group">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Leo" class="w-32 h-32 mx-auto group-hover:rotate-12 transition-transform">
                    <p class="mt-4 font-bold-game text-indigo-600 uppercase">Blue Bolt</p>
                </div>
                <div onclick="selectPower('pink', 'Mia')" class="glass p-6 cursor-pointer hover:scale-105 transition-all group">
                    <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Mia" class="w-32 h-32 mx-auto group-hover:-rotate-12 transition-transform">
                    <p class="mt-4 font-bold-game text-pink-600 uppercase">Pink Fire</p>
                </div>
            </div>
        </div>
        <!-- Pie de página en Onboarding -->
        <div class="w-full py-4 text-center text-indigo-300 font-medium text-sm animate__animated animate__fadeInUp">
            By Ing. Milko Gonzales C
        </div>
    </div>

    <main id="game-container" class="flex-grow pt-24 pb-12 px-4 transition-all duration-500 opacity-0 flex flex-col">
        
        <!-- MISSION MAP -->
        <section id="map-section" class="max-w-md mx-auto relative h-[70vh] w-full flex flex-col items-center justify-around">
            <div class="absolute inset-0 flex justify-center -z-10">
                <svg width="100" height="100%" class="opacity-20">
                    <line x1="50" y1="0" x2="50" y2="100%" stroke="indigo" stroke-width="8" stroke-dasharray="15" class="map-path" />
                </svg>
            </div>

            <button onclick="startMission('learn')" class="relative group animate__animated animate__pulse animate__infinite">
                <div class="w-24 h-24 rounded-full bg-white border-8 border-indigo-400 flex items-center justify-center text-4xl shadow-2xl group-hover:scale-110 transition-transform">🏝️</div>
                <div class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-indigo-600 text-white px-4 py-1 rounded-full font-bold text-xs whitespace-nowrap uppercase">Mission 1</div>
            </button>

            <button id="node-spelling" onclick="startMission('spelling')" class="relative group opacity-50 grayscale pointer-events-none">
                <div class="w-24 h-24 rounded-full bg-white border-8 border-pink-400 flex items-center justify-center text-4xl shadow-2xl group-hover:scale-110 transition-transform">🕵️</div>
                <div class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-pink-600 text-white px-4 py-1 rounded-full font-bold text-xs whitespace-nowrap uppercase">Mission 2</div>
            </button>

            <button id="node-quiz" onclick="startMission('quiz')" class="relative group opacity-50 grayscale pointer-events-none">
                <div class="w-32 h-32 rounded-[40px] bg-gradient-to-tr from-yellow-400 to-orange-500 border-8 border-white flex items-center justify-center text-6xl shadow-2xl group-hover:scale-110 transition-transform">🏰</div>
                <div class="absolute -bottom-8 left-1/2 -translate-x-1/2 bg-orange-600 text-white px-4 py-1 rounded-full font-bold text-xs whitespace-nowrap uppercase">Final Castle</div>
            </button>
        </section>

        <!-- MISSION 2: SPELLING -->
        <section id="spelling-section" class="hidden max-w-2xl mx-auto w-full">
            <div class="glass p-10 text-center relative overflow-hidden">
                <div id="spelling-icon" class="text-9xl mb-8 animate__animated animate__bounceIn">❓</div>
                <div id="spelling-slots" class="flex justify-center flex-wrap gap-4 mb-12 min-h-[100px]"></div>
                <div id="spelling-letters" class="flex flex-wrap justify-center gap-4"></div>
                
                <div class="mt-12 h-6 w-full bg-slate-100 rounded-full border-2 border-white overflow-hidden shadow-inner">
                    <div id="spelling-progress" class="h-full bg-gradient-to-r from-pink-400 to-indigo-500 transition-all duration-700 ease-out" style="width: 0%"></div>
                </div>
                <p class="mt-2 text-xs font-bold text-slate-400 uppercase tracking-widest">Progress to Mission 3</p>
            </div>
        </section>

        <!-- MISSION 1: LEARN -->
        <section id="learn-section" class="hidden w-full">
            <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-6 max-w-6xl mx-auto" id="learn-grid"></div>
        </section>

        <!-- FINAL MISSION: CASTLE QUIZ -->
        <section id="quiz-section" class="hidden max-w-2xl mx-auto w-full">
            <div id="quiz-card" class="glass p-12 text-center shadow-2xl relative min-h-[500px] flex flex-col justify-center">
            </div>
        </section>

    </main>

    <!-- Global Footer -->
    <footer class="w-full py-6 text-center text-indigo-400 font-medium text-sm opacity-60">
        By Ing. Milko Gonzales C
    </footer>

    <script>
        const originalVocabulary = [
            { word: 'THE', icon: '👈' },
            { word: 'PAT', icon: '🖐️' },
            { word: 'A', icon: '☝️' },
            { word: 'AN', icon: '🍎' },
            { word: 'AT', icon: '📍' },
            { word: 'HAD', icon: '🎒' },
            { word: 'MAN', icon: '👨' },
            { word: 'AND', icon: '➕' },
            { word: 'FAT', icon: '🍔' },
            { word: 'MAT', icon: '🧘' },
            { word: 'RAT', icon: '🐭' },
            { word: 'CHAT', icon: '💬' },
            { word: 'CAT', icon: '🐱' },
            { word: 'BAT', icon: '🦇' },
            { word: 'CAN', icon: '🥫' }
        ];

        let state = {
            stars: 0,
            userPower: 'blue',
            userName: 'Leo',
            currentSection: 'map',
            spellingIdx: 0,
            quizIdx: 0,
            quizCorrect: 0,
            currentVocab: [...originalVocabulary],
            unlockedLevels: ['learn'],
            finalScore: 0
        };

        function selectPower(color, name) {
            state.userPower = color;
            state.userName = name;
            document.documentElement.style.setProperty('--p-color', color === 'blue' ? '#6366f1' : '#ec4899');
            document.getElementById('hud-avatar').src = `https://api.dicebear.com/7.x/bottts/svg?seed=${name}`;
            document.getElementById('onboarding').classList.add('animate__animated', 'animate__fadeOutUp');
            setTimeout(() => {
                document.getElementById('onboarding').classList.add('hidden');
                document.getElementById('game-container').classList.remove('opacity-0');
                updateSpeech(`Hi! I'm ${name}. Welcome to Footprints English Academy!`);
            }, 500);
        }

        function updateSpeech(text) {
            document.getElementById('leo-talk').innerText = text;
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'en-US';
            speechSynthesis.speak(utter);
        }

        function playWord(word) {
            speechSynthesis.cancel();
            let voiceWord = word.toLowerCase();
            if(voiceWord === 'the') voiceWord = 'tha'; 
            
            const utter = new SpeechSynthesisUtterance(voiceWord);
            utter.lang = 'en-US';
            utter.rate = 0.7;
            speechSynthesis.speak(utter);
        }

        function playLetter(letter) {
            speechSynthesis.cancel();
            const utter = new SpeechSynthesisUtterance(letter.toLowerCase());
            utter.lang = 'en-US';
            utter.rate = 1.0;
            speechSynthesis.speak(utter);
        }

        function startMission(id) {
            document.querySelectorAll('section').forEach(s => s.classList.add('hidden'));
            const target = document.getElementById(`${id}-section`);
            if(target) target.classList.remove('hidden');
            state.currentSection = id;
            if(id === 'learn') renderLearn();
            if(id === 'spelling') { state.spellingIdx = 0; renderSpelling(); }
            if(id === 'quiz') { state.quizIdx = 0; state.quizCorrect = 0; renderQuiz(); }
        }

        function showSection(id) { startMission(id); }

        function renderLearn() {
            const grid = document.getElementById('learn-grid');
            grid.innerHTML = originalVocabulary.map(v => `
                <div onclick="learnClick(this, '${v.word}')" class="glass p-6 cursor-pointer btn-bounce flex flex-col items-center group">
                    <span class="text-5xl group-hover:scale-125 transition-transform">${v.icon}</span>
                    <span class="mt-4 font-bold-game text-xl text-indigo-600">${v.word}</span>
                </div>
            `).join('');
            updateSpeech("Tap the cards to hear the words!");
        }

        function learnClick(el, word) {
            playWord(word);
            createSparkles(el);
            updateStars(1);
            if(state.stars >= 10 && !state.unlockedLevels.includes('spelling')) {
                state.unlockedLevels.push('spelling');
                const node = document.getElementById('node-spelling');
                node.classList.remove('opacity-50', 'grayscale', 'pointer-events-none');
                node.classList.add('animate__animated', 'animate__rubberBand');
            }
        }

        function renderSpelling() {
            const progress = (state.spellingIdx / originalVocabulary.length) * 100;
            document.getElementById('spelling-progress').style.width = `${progress}%`;

            if (state.spellingIdx >= originalVocabulary.length) {
                unlockBadge(1);
                showSection('map');
                state.unlockedLevels.push('quiz');
                const node = document.getElementById('node-quiz');
                node.classList.remove('opacity-50', 'grayscale', 'pointer-events-none');
                updateSpeech("Amazing! The Final Castle is open!");
                return;
            }

            const current = originalVocabulary[state.spellingIdx];
            document.getElementById('spelling-icon').innerText = current.icon;
            document.getElementById('spelling-slots').innerHTML = current.word.split('').map(() => `
                <div class="w-14 h-16 border-4 border-dashed border-slate-300 rounded-2xl flex items-center justify-center text-3xl font-bold-game text-indigo-600 bg-white/50"></div>
            `).join('');
            
            const letters = current.word.split('').sort(() => Math.random() - 0.5);
            document.getElementById('spelling-letters').innerHTML = letters.map(l => `
                <button onclick="checkLetter('${l}', this)" class="w-14 h-14 glass font-bold-game text-2xl text-slate-700 btn-bounce uppercase">${l}</button>
            `).join('');
            playWord(current.word);
        }

        function checkLetter(l, btn) {
            const word = originalVocabulary[state.spellingIdx].word;
            const slots = document.getElementById('spelling-slots').children;
            const next = Array.from(slots).findIndex(s => s.innerText === "");
            
            playLetter(l);
            
            if(word[next] === l) {
                slots[next].innerText = l;
                btn.classList.add('opacity-0', 'pointer-events-none');
                
                if(Array.from(slots).every(s => s.innerText !== "")) {
                    confetti({ particleCount: 30, spread: 60, origin: { y: 0.7 } });
                    
                    // Al completar de deletrear la última letra, damos un pequeño espacio (800ms) 
                    // antes de decir la palabra completa para que se entienda el proceso.
                    setTimeout(() => {
                        playWord(word);
                    }, 800);

                    state.spellingIdx++;
                    
                    // Esperamos para mostrar la siguiente palabra o terminar la misión
                    setTimeout(renderSpelling, 2500);
                }
            } else {
                btn.classList.add('animate__animated', 'animate__headShake', 'bg-red-50');
                setTimeout(() => btn.classList.remove('animate__animated', 'animate__headShake', 'bg-red-50'), 500);
            }
        }

        function renderQuiz() {
            const card = document.getElementById('quiz-card');
            if(state.quizIdx >= state.currentVocab.length) { finishQuiz(); return; }
            
            const current = state.currentVocab[state.quizIdx];
            let options = [current.word];
            const others = originalVocabulary.filter(v => v.word !== current.word);
            while(options.length < 4) {
                const rnd = others[Math.floor(Math.random() * others.length)].word;
                if(!options.includes(rnd)) options.push(rnd);
            }
            options.sort(() => Math.random() - 0.5);

            card.innerHTML = `
                <div class="mb-4 text-indigo-600 font-bold uppercase text-xs">Question ${state.quizIdx + 1}/15</div>
                <div class="text-9xl mb-8 animate__animated animate__zoomIn">${current.icon}</div>
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    ${options.map(opt => `
                        <button onclick="checkQuizAnswer('${opt}', this)" class="glass p-6 text-3xl font-bold-game text-indigo-700 btn-bounce uppercase">${opt}</button>
                    `).join('')}
                </div>
            `;
            playWord(current.word);
        }

        function checkQuizAnswer(answer, btn) {
            const current = state.currentVocab[state.quizIdx];
            if(answer === current.word) {
                state.quizCorrect++;
                btn.classList.add('bg-green-400', 'text-white', 'border-green-500');
                confetti({ particleCount: 15 });
            } else {
                btn.classList.add('bg-red-400', 'text-white', 'border-red-500');
            }
            state.quizIdx++;
            setTimeout(renderQuiz, 1000);
        }

        function finishQuiz() {
            state.finalScore = Math.round((state.quizCorrect / originalVocabulary.length) * 100);
            const card = document.getElementById('quiz-card');
            
            if(state.finalScore >= 70) {
                unlockBadge(2); unlockBadge(3);
                card.innerHTML = `
                    <h2 class="text-5xl font-bold-game text-yellow-500 mb-6">MISSION COMPLETE!</h2>
                    <div class="text-9xl mb-8">🏆</div>
                    <p class="text-2xl font-bold-game text-slate-600 mb-8">Final Score: ${state.finalScore}%</p>
                    <button onclick="askForName()" class="glass px-8 py-4 text-xl font-bold-game bg-indigo-600 text-white btn-bounce uppercase">Get Diploma</button>
                `;
                updateSpeech("Congratulations! You are a master explorer!");
            } else {
                card.innerHTML = `
                    <h2 class="text-5xl font-bold-game text-red-500 mb-6">NOT ENOUGH!</h2>
                    <div class="text-8xl mb-8">📚</div>
                    <p class="text-xl font-medium text-slate-600 mb-8">You need 70% to pass. Try again!</p>
                    <button onclick="startMission('quiz')" class="glass px-8 py-4 text-xl font-bold-game bg-orange-500 text-white btn-bounce uppercase">Restart Quiz</button>
                `;
                updateSpeech("Don't give up! Let's try again.");
            }
        }

        function askForName() { document.getElementById('name-modal').classList.remove('hidden'); }

        function processCertificate() {
            const name = document.getElementById('student-name').value;
            if(!name.trim()) return;
            generateCertificate(state.finalScore, name.toUpperCase());
            document.getElementById('name-modal').classList.add('hidden');
        }

        function generateCertificate(score, name) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF('l', 'mm', 'a4');
            const w = doc.internal.pageSize.getWidth();
            const h = doc.internal.pageSize.getHeight();

            doc.setFillColor(255, 255, 255);
            doc.rect(0, 0, w, h, 'F');
            doc.setDrawColor(99, 102, 241);
            doc.setLineWidth(5);
            doc.rect(10, 10, w-20, h-20);
            doc.setDrawColor(244, 63, 94);
            doc.setLineWidth(0.8);
            doc.rect(13, 13, w-26, h-26);

            doc.setTextColor(30, 41, 59);
            doc.setFont("helvetica", "bold");
            doc.setFontSize(48);
            doc.text("DIPLOMA OF EXCELLENCE", w/2, 45, { align: 'center' });

            doc.setFontSize(14);
            doc.setFont("helvetica", "normal");
            doc.setTextColor(100, 116, 139);
            doc.text("FOOTPRINTS ENGLISH ACADEMY", w/2, 55, { align: 'center' });

            doc.setDrawColor(203, 213, 225);
            doc.setLineWidth(0.5);
            doc.line(w/2 - 40, 62, w/2 + 40, 62);

            doc.setFontSize(20);
            doc.setTextColor(71, 85, 105);
            doc.text("This certificate is proudly awarded to:", w/2, 85, { align: 'center' });

            doc.setTextColor(79, 70, 229);
            doc.setFontSize(54);
            doc.setFont("times", "bolditalic");
            doc.text(name, w/2, 115, { align: 'center' });

            doc.setTextColor(71, 85, 105);
            doc.setFont("helvetica", "normal");
            doc.setFontSize(18);
            doc.text("For successfully mastering the 15 Magic Short A Words", w/2, 135, { align: 'center' });
            doc.setFont("helvetica", "bold");
            doc.text("UNIT 1 FIRST GRADE: THE MAGIC SHORT A QUEST", w/2, 145, { align: 'center' });

            doc.setDrawColor(251, 191, 36);
            doc.setFillColor(254, 243, 199);
            doc.setLineWidth(1.5);
            doc.circle(w/2, 175, 18, 'FD');
            
            doc.setTextColor(180, 83, 9);
            doc.setFontSize(10);
            doc.text("SCORE", w/2, 173, { align: 'center' });
            doc.setFontSize(20);
            doc.setFont("helvetica", "bold");
            doc.text(`${score}%`, w/2, 181, { align: 'center' });

            doc.setDrawColor(34, 197, 94);
            doc.setLineWidth(1);
            doc.circle(w-45, h-45, 15, 'D');
            doc.setTextColor(22, 101, 52);
            doc.setFontSize(8);
            doc.text("VERIFIED", w-45, h-47, { align: 'center' });
            doc.text("MASTER", w-45, h-42, { align: 'center' });
            doc.text("ACADEMY", w-45, h-37, { align: 'center' });

            doc.setFontSize(9);
            doc.setTextColor(148, 163, 184);
            doc.text(`ID: FOOT-LK-${Math.floor(100000 + Math.random() * 900000)}`, 25, h-20);
            doc.text(`By Ing. Milko Gonzales C - Date: ${new Date().toLocaleDateString()}`, w-85, h-20);

            doc.save(`Footprints_Diploma_${name.replace(/\s/g, '_')}.pdf`);
        }

        function updateStars(n) {
            state.stars += n;
            document.getElementById('stars-count').innerText = state.stars;
        }

        function unlockBadge(id) {
            const el = document.getElementById(`badge-${id}`);
            if(el) el.classList.remove('opacity-30', 'grayscale');
        }

        function createSparkles(el) {
            const rect = el.getBoundingClientRect();
            for(let i=0; i<6; i++) {
                const s = document.createElement('div');
                s.className = 'sparkle';
                s.style.left = (rect.left + rect.width/2) + 'px';
                s.style.top = (rect.top + rect.height/2) + 'px';
                s.style.setProperty('--tx', (Math.random()-0.5) * 120 + 'px');
                s.style.setProperty('--ty', (Math.random()-0.5) * 120 + 'px');
                document.body.appendChild(s);
                setTimeout(() => s.remove(), 800);
            }
        }
    </script>
</body>
</html>
